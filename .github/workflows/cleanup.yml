name: Cleanup Artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAYS_OLD=30
          SKIP_RECENT=5
          CUTOFF=$(date -u -d "${DAYS_OLD} days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh api --paginate "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            | jq -rs --arg cutoff "$CUTOFF" --argjson skip "$SKIP_RECENT" \
              '[.[].artifacts[] | select(.created_at < $cutoff)] |
               sort_by(.created_at) | reverse | .[($skip):] | .[].id' \
            | while read -r id; do
                gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" \
                  && echo "Deleted artifact $id" \
                  || echo "Skipped artifact $id (not found)"
              done

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
